  <script>
    window.SCHEDULE_LOG_AUTH_HASH='';
    window.SCHEDULE_LOG_GOOGLE_CLIENT_ID='';

  <style>
    :root {
      --bg: #f5f1eb;
      --card: #fffef9;
      --text: #2c2825;
      --muted: #6b6560;
      --accent: #c17f59;
      --accent-soft: #e8d5cc;
      --border: #e5e0d8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    .container { max-width: 640px; margin: 0 auto; padding: 1.25rem 1rem; }
    h1 {
      font-family: 'DM Serif Display', 'Noto Sans SC', serif;
      font-size: 1.5rem;
      font-weight: 400;
      margin: 0 0 1rem 0;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .meta label { color: var(--muted); font-size: 0.9rem; }
    .meta input[type="date"] {
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      color: var(--text);
      font-family: inherit;
    }
    .hour-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }
    .hour-row label {
      flex: 0 0 4rem;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .hour-row input {
      flex: 1;
      padding: 0.5rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
    }
    .hour-row input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-soft);
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }
    .actions button, .actions a.btn {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      border: none;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-secondary {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--accent-soft); }
    .link-bar { margin-top: 1rem; font-size: 0.85rem; }
    .link-bar a { color: var(--accent); }
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.5rem 1rem;
      background: var(--text);
      color: var(--card);
      border-radius: 8px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="schedule-log-auth-gate" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;align-items:center;justify-content:center;flex-direction:column;padding:2rem;font-family:inherit;">
    <h2 style="margin:0 0 1.5rem 0;font-size:1.25rem;font-weight:500;color:var(--text);">日程日志 · 登录</h2>
    <form id="schedule-log-auth-form" style="display:flex;flex-direction:column;gap:0.75rem;width:100%;max-width:280px;">
      <input type="text" name="user" placeholder="账号" autocomplete="username" style="padding:0.6rem 0.75rem;border:1px solid var(--border);border-radius:8px;font-size:1rem;background:var(--card);color:var(--text);" />
      <input type="password" name="pass" placeholder="密码" autocomplete="current-password" style="padding:0.6rem 0.75rem;border:1px solid var(--border);border-radius:8px;font-size:1rem;background:var(--card);color:var(--text);" />
      <button type="submit" style="padding:0.6rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;">登录</button>
      <p class="auth-msg" style="display:none;margin:0;color:var(--accent);font-size:0.9rem;"></p>
    </form>
    <div id="schedule-log-google-one" style="margin-top:1rem;min-height:44px;"></div>
  </div>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
  (function(){
    var H=window.SCHEDULE_LOG_AUTH_HASH;
    var GID=window.SCHEDULE_LOG_GOOGLE_CLIENT_ID;
    var ALLOWED=window.SCHEDULE_LOG_ALLOWED_GOOGLE_EMAILS;
    var hasPw=H&&H!==''&&H!=='';
    var hasGoogle=GID&&GID!==''&&Array.isArray(ALLOWED)&&ALLOWED.length>0;
    if((!hasPw&&!hasGoogle)||sessionStorage.getItem('schedule_log_auth'))return;
    var gate=document.getElementById('schedule-log-auth-gate');
    gate.style.display='flex';
    document.body.style.overflow='hidden';
    if(hasPw){
      gate.querySelector('form').style.display='flex';
      gate.querySelector('form').onsubmit=async function(e){
        e.preventDefault();
        var u=gate.querySelector('[name=user]').value.trim();
        var p=gate.querySelector('[name=pass]').value;
        var msg=gate.querySelector('.auth-msg');
        var buf=new TextEncoder().encode(u+':'+p);
        var digest=await crypto.subtle.digest('SHA-256',buf);
        var hex=Array.from(new Uint8Array(digest)).map(function(b){return ('0'+b.toString(16)).slice(-2);}).join('');
        if(hex===H){sessionStorage.setItem('schedule_log_auth','1');location.reload();}
        else{msg.textContent='账号或密码错误';msg.style.display='block';}
      };
    }else gate.querySelector('form').style.display='none';
    if(hasGoogle){
      function onGoogleCredential(response){
        try{
          var payload=JSON.parse(atob(response.credential.split('.')[1]));
          var email=(payload.email||'').toLowerCase();
          if(ALLOWED.indexOf(email)!==-1){sessionStorage.setItem('schedule_log_auth','1');location.reload();}
          else{var msg=gate.querySelector('.auth-msg');msg.textContent='该 Google 账号未授权';msg.style.display='block';}
        }catch(e){gate.querySelector('.auth-msg').textContent='登录失败';gate.querySelector('.auth-msg').style.display='block';}
      }
      function renderGoogleBtn(){
        if(typeof google!=='undefined'&&google.accounts&&google.accounts.id){
          google.accounts.id.initialize({client_id:GID,callback:onGoogleCredential});
          google.accounts.id.renderButton(document.getElementById('schedule-log-google-one'),{theme:'outline',size:'large',width:280,type:'standard'});
        }else setTimeout(renderGoogleBtn,100);
      }
      renderGoogleBtn();
    }
  })();
  </script>

    </div>

            });
          } catch (_) {}
        }
        if (count === 0) {
          showToast('本地暂无已保存的日程，请先保存再导出');
          return;
        }
        const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'schedule_export_all_' + (dateInput.value || todayStr()) + '.csv';
        a.click();
        URL.revokeObjectURL(a.href);
        showToast('已导出全部 ' + count + ' 条，传到 Mac 后执行导入并重新部署');
      }

      dateInput.addEventListener('change', renderRows);
      btnSave.addEventListener('click', () => {
        const date = dateInput.value || todayStr();
        saveToStorage(date);
        showToast('已保存到本地');
      });
      btnExport.addEventListener('click', exportCsv);
      document.getElementById('btn-export-all').addEventListener('click', exportAllForSync);
      document.getElementById('btn-refresh').addEventListener('click', function() {
        showToast('重新加载中…');
        location.reload();
      });

      initDate();
      renderRows();

      if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
        navigator.serviceWorker.register('sw.js').catch(function() {});
      }
    })();
  </script>
</body>
</html>
